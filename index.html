<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine 💘</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffe6f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  width: 90%;
  max-width: 360px;
}

.buttons {
  position: relative;
  height: 120px;
}

button {
  padding: 12px 22px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#yes {
  background: #ff4d88;
  color: white;
}

#no {
  background: #ccc;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.hidden {
  display: none;
}

img {
  max-width: 100%;
  border-radius: 12px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="card" id="question">
  <h1>Léa, est-ce que tu veux être ma valentine ? 💖</h1>
  <div class="buttons">
    <button id="yes">Oui</button>
    <button id="no">Non</button>
  </div>
</div>

<div class="card hidden" id="result">
  <h2>😏 J’en avais aucun doute</h2>
  <p>
    Je le savais que tu m’aimais.<br>
    Je le savais qu’on était amis pour la vie…<br>
    voire plus. 💕
  </p>

  <img src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif" alt="Humour love gif">
</div>

<script>
const noBtn = document.getElementById('no');
const yesBtn = document.getElementById('yes');

function moveButton() {
  const x = Math.random() * 200 - 100;
  const y = Math.random() * 80;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

noBtn.addEventListener('mouseover', moveButton);
noBtn.addEventListener('touchstart', moveButton);

yesBtn.addEventListener('click', () => {
  document.getElementById('question').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
});
</script>

</body>
</html>
