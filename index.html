<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pardon 🥺</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #fff1f3;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.card {
  background: white;
  padding: 28px;
  border-radius: 18px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.12);
  width: 90%;
  max-width: 380px;
}

.gif {
  max-width: 100%;
  border-radius: 14px;
  margin: 12px 0 20px;
}

.buttons {
  position: relative;
  height: 130px;
}

button {
  padding: 13px 24px;
  font-size: 17px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 8px;
}

#no {
  background: #ff5c8a;
  color: white;
}

#yes {
  background: #ccc;
  position: absolute;
  left: 50%;
  top: 55px;
  transform: translateX(-50%);
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="card" id="question">
  <h1>Est-ce que tu m’en veux toujours ? 🥺</h1>

  <img class="gif" 
       src="https://media.giphy.com/media/yr7n0u3qzO9nG/giphy.gif" 
       alt="Flamme triste">

  <div class="buttons">
    <button id="no">Non</button>
    <button id="yes">Oui</button>
  </div>
</div>

<div class="card hidden" id="result">
  <h2>Merci beaucoup 🥺💖</h2>

  <img class="gif" 
       src="https://media.giphy.com/media/11s7Ke7jcNxCHS/giphy.gif" 
       alt="Stitch pitié">

  <p>
    Merci beaucoup de pas encore trop m’en vouloir.<br><br>
    Je suis désolé, j’espère qu’on va réussir à s’entendre à nouveau.
  </p>
</div>

<script>
const yesBtn = document.getElementById('yes');
const noBtn = document.getElementById('no');

function moveYesButton() {
  const x = Math.random() * 220 - 110;
  const y = Math.random() * 90;
  yesBtn.style.transform = `translate(${x}px, ${y}px)`;
}

yesBtn.addEventListener('mouseover', moveYesButton);
yesBtn.addEventListener('touchstart', moveYesButton);

noBtn.addEventListener('click', () => {
  document.getElementById('question').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
});
</script>

</body>
</html>
